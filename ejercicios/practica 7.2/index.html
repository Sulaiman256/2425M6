<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juego de Fichas</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .tablero {
        position: relative;
        width: 600px;
        height: 600px;
        background-color: #f0f0f0;
        border: 2px solid #333;
        overflow: hidden;
        margin: 20px auto;
      }

      .tablero img {
        width: 100%;
        height: 100%;
      }

      .ficha {
        position: absolute;
        width: 30px;
        height: 30px;
        border-radius: 50%;
      }

      .jugador1 {
        background-color: red;
      }

      .jugador2 {
        background-color: yellow;
      }

      .tablero #ficha1 {
        top: 450px;
        left: 120px;
        transition: top 0.5s ease, left 0.5s ease;
      }

      .tablero #ficha2 {
        top: 480px;
        left: 120px;
        transition: top 0.5s ease, left 0.5s ease;
      }

      .Botones {
        display: flex;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Juego de Fichas</h1>

    <div class="tablero">
      <img src="tablero.png" alt="Tablero de juego" />
      <div id="ficha1" class="ficha jugador1"></div>
      <div id="ficha2" class="ficha jugador2"></div>
    </div>

    <div class="Botones">
      <button id="dado1">Tirar Dado Jugador 1</button>
      <button id="dado2">Tirar Dado Jugador 2</button>
    </div>

    <script src="index.js"></script>
  </body>
</html>
