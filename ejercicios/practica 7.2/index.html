<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atrápame</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <style>
      .casillas {
        width: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .casilla {
        width: 30px;
        height: 30px;
        border: 1px solid white;
        margin: 5px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .ficha {
        border: 1px solid;
        height: 20px;
        width: 20px;
        border-radius: 100%;
        position: absolute;
        left: 30%;
        top: 35%;
        /* Cambié esto para asegurar que se pueda mover */
      }

      .jugador1 {
        background-color: red;
      }

      .jugador2 {
        background-color: yellow;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Atrápame si puedes</h1>

      <div class="tablero border-2">
        <!-- Tablero como imagen -->
        <img src="tablero.png" alt="Tablero del juego" />

        <!-- Fichas de los jugadores -->
        <div class="ficha jugador1" id="fichaJugador1"></div>
        <div class="ficha jugador2" id="fichaJugador2"></div>
      </div>

      <div class="d-flex justify-content-between mt-4">
        <button id="lanzarDado1" class="btn btn-primary">
          Jugador 1: Lanzar dado
        </button>
        <button id="lanzarDado2" class="btn btn-warning">
          Jugador 2: Lanzar dado
        </button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
